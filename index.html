/* ================================================
   PATCH v3 — Background Logo Fix
   - Beku/fixed di viewport (tidak scroll)
   - Terlihat di section biru maupun putih
   - Ukuran besar seperti semula
   Tempelkan di paling bawah <style> HTML
   ================================================ */

/* Hapus implementasi lama */
.commitment-background-logo,
.commitment-background-logo2 {
  position: fixed !important;
  pointer-events: none !important;
  z-index: 0 !important;

  /* Ukuran besar seperti semula */
  width: 45vw !important;
  height: auto !important;

  /* Opacity cukup agar terlihat di bg apapun */
  opacity: 0.06 !important;

  /* mix-blend-mode: multiply agar terlihat di bg putih */
  /* dan tetap subtle di bg biru */
  mix-blend-mode: multiply !important;

  /* Matikan display:none dari patch sebelumnya */
  display: block !important;
}

/* Logo 1 (cvteam.png) — pojok kanan bawah */
.commitment-background-logo {
  bottom: 5vh !important;
  right: -5vw !important;
  top: auto !important;
  left: auto !important;
  transform: none !important;
  margin: 0 !important;
}

/* Logo 2 (personcv.png) — pojok kiri atas */
.commitment-background-logo2 {
  top: 8vh !important;
  left: -3vw !important;
  bottom: auto !important;
  right: auto !important;
  transform: none !important;
  margin: 0 !important;
  width: 30vw !important;
}

/* Pastikan semua section tidak clip elemen fixed */
body {
  overflow-x: hidden;
}
